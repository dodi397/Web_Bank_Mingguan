{% extends "base_public.html" %}
{% block content %}
<div class="page-header" data-aos="fade-up">
  <h2 class="fw-bold text-white">Konfirmasi Transfer</h2>
  <p class="text-white-50 mb-0">Upload bukti transfer pembayaran Anda.</p>
</div>

<div class="row g-4 mt-1">
  <div class="col-lg-8">
    <div class="form-card">
      <form method="post" enctype="multipart/form-data">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Kode Pinjaman</label>
            <input type="text" class="form-control" name="kode_pinjaman" placeholder="Contoh: PJ202607170001" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Tanggal Transfer</label>
            <input type="date" class="form-control" name="tanggal_transfer" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Nominal</label>
            <input type="number" class="form-control" name="nominal" min="1" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bank Pengirim</label>
            <input type="text" class="form-control" name="bank_pengirim" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Nama Pengirim</label>
            <input type="text" class="form-control" name="nama_pengirim" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bukti Transfer</label>
            <input type="file" class="form-control" name="bukti_transfer" id="bukti_transfer" accept="image/*" required>
          </div>
          <div class="col-12">
            <label class="form-label">Keterangan</label>
            <textarea class="form-control" name="keterangan" rows="3" placeholder="Opsional"></textarea>
          </div>
        </div>
        <button class="btn btn-success w-100 rounded-pill py-2 mt-4"><i class="bi bi-send me-2"></i>Kirim Konfirmasi</button>
      </form>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="upload-preview h-100">
      <h5 class="fw-bold mb-3">Preview Bukti</h5>
      <img src="" alt="Preview" id="previewImage" class="img-fluid rounded-4 d-none">
      <div class="placeholder-box" id="previewPlaceholder">
        <i class="bi bi-image"></i>
        <p class="mb-0 mt-2">Preview akan tampil di sini</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
