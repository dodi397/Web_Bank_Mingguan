{% extends "dashboard/base_dashboard.html" %}
{% block content %}
<div class="form-card">
  <h5 class="fw-bold mb-4">Tambah Pinjaman</h5>
  <form method="post">
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label">Nasabah</label>
        <select class="form-select" name="nasabah_id" required>
          <option value="">Pilih Nasabah</option>
          {% for n in nasabah_list %}
          <option value="{{ n.id }}">{{ n.nama }} - {{ n.nik }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">Jumlah Pinjaman</label><input type="number" class="form-control" name="jumlah_pinjaman" id="jumlah_pinjaman" min="1" required></div>
      <div class="col-md-4"><label class="form-label">Bunga (%)</label><input type="number" step="0.1" class="form-control" name="bunga" id="bunga" min="0" value="2" required></div>
      <div class="col-md-4"><label class="form-label">Tenor (Minggu)</label><input type="number" class="form-control" name="tenor_minggu" id="tenor_minggu" min="1" value="12" required></div>
    </div>
    <div class="mt-3 small text-muted">Perhitungan angsuran akan dihitung otomatis saat data disimpan.</div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-success rounded-pill px-4">Simpan</button>
      <a href="{{ url_for('pinjaman.list_pinjaman') }}" class="btn btn-outline-secondary rounded-pill px-4">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
