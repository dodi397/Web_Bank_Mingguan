{% extends "dashboard/base_dashboard.html" %}
{% block content %}
<div class="form-card">
  <h5 class="fw-bold mb-4">Edit Pinjaman</h5>
  <form method="post">
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label">Nasabah</label>
        <select class="form-select" name="nasabah_id" required>
          {% for n in nasabah_list %}
          <option value="{{ n.id }}" {% if n.id == pinjaman.nasabah_id %}selected{% endif %}>{{ n.nama }} - {{ n.nik }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">Jumlah Pinjaman</label><input type="number" class="form-control" name="jumlah_pinjaman" value="{{ pinjaman.jumlah_pinjaman }}" min="1" required></div>
      <div class="col-md-4"><label class="form-label">Bunga (%)</label><input type="number" step="0.1" class="form-control" name="bunga" value="{{ pinjaman.bunga }}" min="0" required></div>
      <div class="col-md-4"><label class="form-label">Tenor (Minggu)</label><input type="number" class="form-control" name="tenor_minggu" value="{{ pinjaman.tenor_minggu }}" min="1" required></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-success rounded-pill px-4">Update</button>
      <a href="{{ url_for('pinjaman.list_pinjaman') }}" class="btn btn-outline-secondary rounded-pill px-4">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
