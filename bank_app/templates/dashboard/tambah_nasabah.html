{% extends "dashboard/base_dashboard.html" %}
{% block content %}
<div class="form-card">
  <h5 class="fw-bold mb-4">Tambah Nasabah</h5>
  <form method="post">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Nama</label><input class="form-control" name="nama" required></div>
      <div class="col-md-6"><label class="form-label">NIK</label><input class="form-control" name="nik" required></div>
      <div class="col-md-12"><label class="form-label">Alamat</label><textarea class="form-control" name="alamat" rows="3" required></textarea></div>
      <div class="col-md-6"><label class="form-label">No HP</label><input class="form-control" name="no_hp" required></div>
      <div class="col-md-6"><label class="form-label">Pekerjaan</label><input class="form-control" name="pekerjaan" required></div>
      <div class="col-12"><label class="form-label">Tanggal Daftar</label><input type="date" class="form-control" name="tanggal_daftar"></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-success rounded-pill px-4">Simpan</button>
      <a href="{{ url_for('nasabah.list_nasabah') }}" class="btn btn-outline-secondary rounded-pill px-4">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
