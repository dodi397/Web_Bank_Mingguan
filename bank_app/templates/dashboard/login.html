<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Admin - {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-bg"></div>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="login-card" data-aos="fade-up">
      <div class="text-center mb-4">
        <div class="brand-logo mx-auto mb-3"><i class="bi bi-bank"></i></div>
        <h3 class="fw-bold mb-1">{{ app_name }}</h3>
        <p class="text-muted mb-0">Login Admin</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} rounded-4 border-0">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input class="form-control" type="text" name="username" placeholder="Username" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input class="form-control" type="password" name="password" placeholder="Password" required>
        </div>
        <button class="btn btn-success w-100 py-2 rounded-pill"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
      </form>
      <p class="text-muted small text-center mt-4 mb-0">Gunakan akun admin bawaan untuk pertama kali.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>AOS.init({duration: 700, once: true});</script>
</body>
</html>
